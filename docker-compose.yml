services:
  api:
    build: .
    container_name: ey-audit-ai-api
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    container_name: ey-audit-ai-redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    container_name: ey-audit-ai-postgres
    environment:
      POSTGRES_DB: audit_ai
      POSTGRES_USER: audit_ai
      POSTGRES_PASSWORD: audit_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: ey-audit-ai-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.4.0
    container_name: ey-audit-ai-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    profiles: ["observability"]

volumes:
  postgres_data:
