    <text x="765" y="418" font-size="14" fill="#667085">Duplicate invoice signals</text>
    <text x="765" y="441" font-size="14" fill="#667085">Vendor-risk features</text>
    <text x="765" y="464" font-size="14" fill="#667085">Isolation Forest anomaly score</text>
