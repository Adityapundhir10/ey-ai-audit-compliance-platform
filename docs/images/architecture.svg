  <text x="60" y="105" font-family="Arial" font-size="16" fill="#586174">Clean-room architecture for invoice validation, RAG policy evidence, fraud scoring, and audit workflow automation</text>
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.15"/></filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#4b5d78"/></marker>
  </defs>
  <g font-family="Arial" filter="url(#shadow)">
    <rect x="60" y="150" width="210" height="95" rx="18" fill="#1b2a41"/>
    <text x="88" y="190" font-size="20" font-weight="700" fill="#ffffff">React Dashboard</text>
    <text x="88" y="218" font-size="14" fill="#dce7ff">Workflow monitoring</text>

